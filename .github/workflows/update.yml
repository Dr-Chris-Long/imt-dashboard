name: update-imt-data
on:
  schedule:
    - cron: '0 14 * * *'   # 1400 UTC = 0800 MDT, after ~0730 MDT IMSR post
  workflow_dispatch: {}     # the ACTIVATE button (Actions tab > Run workflow)
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install pdfplumber requests
      - name: Parse IMSR + ledger
        run: python parser/update_data.py   # exits non-zero on anomaly -> no commit -> last-good preserved
      - name: Commit data
        run: |
          git config user.name 'imt-bot'
          git config user.email 'actions@github.com'
          git add data/data.json
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
