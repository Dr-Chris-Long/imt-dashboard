name: update-imt-data
on:
  schedule:
    - cron: '0 14 * * *'   # 1400 UTC = 0800 MDT, after ~0730 MDT IMSR post
  workflow_dispatch: {}     # the ACTIVATE button
permissions:
  contents: write
concurrency:
  group: imt-update
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install pdfplumber requests
      - name: Parse IMSR + ledger (halts on anomaly -> no commit -> last-good preserved)
        run: python parser/update_data.py
      - name: Commit data and mirror to gh-pages
        run: |
          git config user.name 'imt-bot'
          git config user.email 'actions@github.com'
          git add data/data.json
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin main
          git push origin main:gh-pages --force   # deployment mirror; Pages serves gh-pages
